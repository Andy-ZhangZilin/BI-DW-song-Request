# config/field_requirements.yaml
# 11 张数据表需求定义 — 用于聚合结论文档的 AI 分析提示语生成
#
# 结构说明：
#   report_name: 报表中文名称
#   dashboard:   所属报表/仪表盘
#   deadline:    需求时间
#   launch_date: 报表上线时间
#   notes:       业务备注
#   fields:      字段列表（报表需要的列名）
#
# 此文件是纯配置，修改后无需改动任何 Python 代码。
# reporter.py 读取本文件生成聚合文档中的 11 张报表字段映射模板和 AI 分析提示语。

reports:
  - report_name: 利润表
    dashboard: 销售表现、利润表
    deadline: "2026-04-08"
    launch_date: "2026-04-24"
    notes: 销量、订单量、收入、成本、费用的数据来源；费用科目需要到四级
    fields:
      - 日期
      - 渠道
      - 店铺
      - 国家
      - ASIN/sku_id
      - MSKU
      - SKU
      - 科目
      - 数值

  - report_name: 财务科目表
    dashboard: 销售表现、利润表
    deadline: "2026-04-08"
    launch_date: "2026-04-24"
    notes: 财务科目级别关系主数据，可能需要财务提供（更新较少，变动需手动更新）
    fields:
      - 项ID
      - 科目名称
      - 科目级别
      - 一级科目
      - 二级科目
      - 三级科目
      - 四级科目
      - 说明/备注

  - report_name: 营销表现表
    dashboard: 营销推广-渠道效果
    deadline: "2026-04-20"
    launch_date: "2026-05-18"
    notes: 营销归因数据，需要按营销的归因逻辑进行归因处理
    fields:
      - 日期
      - 店铺
      - 推广渠道
      - 推广渠道细分类
      - 曝光量
      - 流量
      - 订单量
      - 销量
      - 销售额
      - 花费
      - 新客数

  - report_name: DTC广告投放数据
    dashboard: 营销推广-广告投放
    deadline: "2026-05-10"
    launch_date: "2026-06-03"
    notes: TW可获取；活动/广告组/广告需含 id/名称
    fields:
      - 日期
      - 店铺名称
      - 推广渠道
      - 推广渠道细分类
      - 活动
      - 广告组
      - 广告
      - 曝光量
      - 流量
      - 订单量
      - 销量
      - 销售额
      - 花费
      - 新客数

  - report_name: KOL信息表
    dashboard: 营销推广-KOL效果
    deadline: "2026-05-15"
    launch_date: "2026-06-12"
    notes: 钉钉多维表数据源
    fields:
      - 红人ID
      - 红人类型
      - 合作平台
      - 跟进人
      - 主页链接
      - 所在州
      - 粉丝数
      - 均播
      - 红人等级
      - 合作模式
      - 付费模式
      - 合作价格及交付项
      - 佣金率
      - 合作review
      - 后续动作
